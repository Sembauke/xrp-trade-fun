services:
  trade-bot:
    build: .
    # Matches what GitHub Actions pushes: ghcr.io/<owner>/<repo>:latest (lowercase)
    image: ghcr.io/sembauke/xrp-trade-fun:latest
    ports:
      - "${PORT:-8787}:8787"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=8787
      - DB_PATH=/app/data/trading.db
      - STARTING_CAPITAL=50000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemma-3n-e2b-it}
      - POLL_MS=${POLL_MS:-300000}
      - GEMINI_DECISION_INTERVAL_MINUTES=${GEMINI_DECISION_INTERVAL_MINUTES:-5}
      - GEMINI_PROFIT_TAKE_MIN_PCT=${GEMINI_PROFIT_TAKE_MIN_PCT:-0.35}
    restart: unless-stopped
    # Friendly healthcheck — NAS container managers show this
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/api/health').then(r=>r.ok||process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
